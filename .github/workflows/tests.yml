name: Tests

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  linux:
    name: Linux tests (run-tests.sh)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Run run-tests.sh
        shell: bash
        run: ./run-tests.sh

  windows:
    name: Windows tests (run-tests.bat)
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4

      - name: Run run-tests.bat
        shell: cmd
        run: run-tests.bat
